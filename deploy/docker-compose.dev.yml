services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: progressql
      POSTGRES_PASSWORD: progressql
      POSTGRES_DB: progressql
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U progressql -d progressql"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: progressql
      POSTGRES_PASSWORD: progressql
      POSTGRES_DB: progressql_test
    ports:
      - "5433:5432"
    volumes:
      - ./docker/seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U progressql -d progressql_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      PROGRESSQL_SERVER_PORT: "8080"
      PROGRESSQL_JWT_SECRET: "test-jwt-secret-for-compose"
      PROGRESSQL_DATABASE_URL: "postgres://progressql:progressql@postgres:5432/progressql?sslmode=disable"
      PROGRESSQL_OPENROUTER_API_KEY: "${PROGRESSQL_OPENROUTER_API_KEY:-}"
      PROGRESSQL_HTTP_MODEL: "${PROGRESSQL_HTTP_MODEL:-qwen/qwen3-coder-next}"
      PROGRESSQL_LOG_LEVEL: "debug"
      PROGRESSQL_ENVIRONMENT: "development"
      PROGRESSQL_SMTP_HOST: "${PROGRESSQL_SMTP_HOST:-smtp.yandex.ru}"
      PROGRESSQL_SMTP_PORT: "${PROGRESSQL_SMTP_PORT:-465}"
      PROGRESSQL_SMTP_USER: "${PROGRESSQL_SMTP_USER:-}"
      PROGRESSQL_SMTP_PASSWORD: "${PROGRESSQL_SMTP_PASSWORD:-}"
      PROGRESSQL_SMTP_FROM: "${PROGRESSQL_SMTP_FROM:-progresql.noreply@yandex.ru}"
      PROGRESSQL_CRYPTOCLOUD_API_KEY: "${PROGRESSQL_CRYPTOCLOUD_API_KEY:-}"
      PROGRESSQL_CRYPTOCLOUD_SHOP_ID: "${PROGRESSQL_CRYPTOCLOUD_SHOP_ID:-}"
      PROGRESSQL_CRYPTOCLOUD_SECRET: "${PROGRESSQL_CRYPTOCLOUD_SECRET:-}"
    depends_on:
      postgres:
        condition: service_healthy
      postgres-test:
        condition: service_healthy

volumes:
  pgdata:
  pgdata_test:
