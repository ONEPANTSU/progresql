# Woodpecker CI — self-hosted CI/CD for ProgreSQL
#
# Запуск:
#   cd /opt/progresql/woodpecker
#   docker compose -f docker-compose.woodpecker.yml up -d
#
# Админка: http://localhost:8000 (или ci.progresql.com через nginx)
#
# Перед запуском:
#   1. Создай GitHub OAuth App: https://github.com/settings/developers
#      - Homepage URL: https://ci.progresql.com
#      - Callback URL: https://ci.progresql.com/authorize
#   2. Заполни .env.woodpecker (см. шаблон ниже)

services:
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - woodpecker-data:/var/lib/woodpecker
    environment:
      - WOODPECKER_HOST=https://ci.progresql.com
      - WOODPECKER_OPEN=false
      - WOODPECKER_ADMIN=ONEPANTSU
      - WOODPECKER_GITHUB=true
      - WOODPECKER_GITHUB_CLIENT=${WOODPECKER_GITHUB_CLIENT}
      - WOODPECKER_GITHUB_SECRET=${WOODPECKER_GITHUB_SECRET}
      - WOODPECKER_AGENT_SECRET=${WOODPECKER_AGENT_SECRET}
    env_file:
      - .env.woodpecker

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:latest
    restart: unless-stopped
    depends_on:
      - woodpecker-server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WOODPECKER_SERVER=woodpecker-server:9000
      - WOODPECKER_AGENT_SECRET=${WOODPECKER_AGENT_SECRET}
      - WOODPECKER_MAX_WORKFLOWS=2
    env_file:
      - .env.woodpecker

volumes:
  woodpecker-data:
