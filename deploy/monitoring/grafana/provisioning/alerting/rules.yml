apiVersion: 1
groups:
  - orgId: 1
    name: ProgreSQL Alerts
    folder: ProgreSQL Alerts
    interval: 1m
    rules:

      # -----------------------------------------------------------------------
      # 1. Backend Down — critical if the backend scrape target disappears
      # -----------------------------------------------------------------------
      - uid: alert-backend-down
        title: Backend Down
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: up{job="backend"}
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: eq
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend is down"
          description: >
            Критично: Prometheus не достучался до /metrics бекенда (up{job="backend"} == 0) ≥1 мин.
            Обычно процесс упал, порт недоступен или сеть Docker между prometheus и контейнером backend.
        isPaused: false

      # -----------------------------------------------------------------------
      # 2. High Error Rate — 5xx responses exceed 5 % of total requests for 5 m
      # -----------------------------------------------------------------------
      - uid: alert-high-error-rate
        title: High Error Rate
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: >
                sum(rate(http_requests_total{job="backend",status_code=~"5.."}[5m]))
                /
                sum(rate(http_requests_total{job="backend"}[5m]))
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate"
          description: >
            Critical for users: сервер массово отвечает ошибками (http_requests_total, label status_code).
            Порог 5 проц. за 5 мин — исключает единичные сбои. Если нет HTTP-трафика, выражение пустое (noData=OK).
        # No backend metrics (e.g. scrape down) must not emit false DatasourceNoData with this summary.
        noDataState: OK
        execErrState: OK
        isPaused: false

      # -----------------------------------------------------------------------
      # 3. High P95 Latency — 95th-percentile response time exceeds 5 s for 5 m
      # -----------------------------------------------------------------------
      - uid: alert-high-p95-latency
        title: High P95 Latency
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: >
                histogram_quantile(0.95,
                  sum by (le) (rate(http_request_duration_seconds_bucket{job="backend"}[5m]))
                )
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 response latency is above 5 s"
          description: >
            Деградация UX/SLA по HTTP (histogram http_request_duration_seconds). Не включает длительные WS-чаты как отдельный сценарий.
            5 сек по P95 ≥5 мин — заметное замедление API.
        noDataState: OK
        execErrState: OK
        isPaused: false

      # -----------------------------------------------------------------------
      # 4. High CPU — CPU utilisation above 90 % for 10 m
      # -----------------------------------------------------------------------
      - uid: alert-high-cpu
        title: High CPU
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: >
                max by () (
                  100 - (
                    avg by (instance) (
                      rate(node_cpu_seconds_total{mode="idle"}[5m])
                    ) * 100
                  )
                )
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [90]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU utilisation is above 90 %"
          description: >
            Загрузка хоста (node_exporter idle). Долгое >90 %% — риск throttling ответов; при росте трафика проверять масштаб/профиль.
        noDataState: OK
        execErrState: OK
        isPaused: false

      # -----------------------------------------------------------------------
      # 5. Low Disk Space — filesystem usage above 85 %
      # -----------------------------------------------------------------------
      - uid: alert-low-disk-space
        title: Low Disk Space
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: >
                max by () (
                  (
                    1 - (
                      node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
                      /
                      node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}
                    )
                  ) * 100
                )
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [85]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Disk usage is above 85 %"
          description: >
            По данным node_filesystem_* (без tmpfs/overlay). Близко к переполнению — Логи, БД, образы могут упасть; расширить диск или чистить.
        execErrState: OK
        isPaused: false

      # -----------------------------------------------------------------------
      # 6. LLM Error Spike — AI agent error rate above 20 % for 5 m
      # -----------------------------------------------------------------------
      - uid: alert-llm-error-spike
        title: LLM Error Spike
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: >
                sum(rate(agent_requests_total{job="backend",status="error"}[5m]))
                /
                sum(rate(agent_requests_total{job="backend"}[5m]))
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.2]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM / AI agent error rate spike"
          description: >
            Доля ошибок пайплайна агента (agent_requests_total, status error) среди всех запросов агента выше 20 проц. за 5 мин.
            Качество продукта/провайдер LLM/API; пользователи видят ошибки генерации.
        noDataState: OK
        execErrState: OK
        isPaused: false

      # -----------------------------------------------------------------------
      # 7. DB Pool Exhausted — active connections / pool capacity above 90 %
      # -----------------------------------------------------------------------
      - uid: alert-db-pool-exhausted
        title: DB Pool Exhausted
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: >
                db_pool_connections_active{job="backend"}
                /
                (
                  db_pool_connections_active{job="backend"}
                  + db_pool_connections_idle{job="backend"}
                )
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.9]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool is near exhaustion"
          description: >
            Риск таймаутов и 5xx под нагрузкой: доля активных коннектов к пулу (db_pool_connections_active / (active+idle)) > 0.9.
            Не означает «полный диск» — см. алерт по диску.
        noDataState: OK
        execErrState: OK
        isPaused: false

      # -----------------------------------------------------------------------
      # 8. High Memory — memory usage above 90 % for 5 m
      # -----------------------------------------------------------------------
      - uid: alert-high-memory
        title: High Memory
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: >
                max by () (
                  (
                    1 - (
                      node_memory_MemAvailable_bytes
                      /
                      node_memory_MemTotal_bytes
                    )
                  ) * 100
                )
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [90]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage is above 90 %"
          description: >
            MemAvailable против MemTotal (node_exporter). Долго высокое использование — риск OOM killer на хосте; не путать с лимитами контейнера.
        noDataState: OK
        execErrState: OK
        isPaused: false
