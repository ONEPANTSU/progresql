# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name progresql.com www.progresql.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name progresql.com www.progresql.com;

    ssl_certificate     /etc/letsencrypt/live/progresql.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/progresql.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/progresql.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers for Electron app (electron:// or file:// origin)
    set $cors_origin "";
    if ($http_origin ~* "^(https?://progresql\.com|app://progresql|electron://progresql|https?://localhost)") {
        set $cors_origin $http_origin;
    }
    # Allow requests with no Origin header (same-origin, curl, etc.)
    if ($http_origin = "") {
        set $cors_origin "*";
    }

    # -------------------------------------------------------------------
    # WebSocket proxy
    # -------------------------------------------------------------------
    location /ws/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # -------------------------------------------------------------------
    # Backend API proxy
    # -------------------------------------------------------------------
    location /api/ {
        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        proxy_buffering off;
    }

    # -------------------------------------------------------------------
    # Static: payment pages (success, fail)
    # -------------------------------------------------------------------
    location /payment/ {
        alias /var/www/progresql/payment/;
        index index.html;
        try_files $uri $uri.html $uri/ =404;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options nosniff always;
    }

    # -------------------------------------------------------------------
    # Static: legal pages (privacy, terms, offer, etc.)
    # -------------------------------------------------------------------
    location /legal/ {
        alias /var/www/progresql/legal/;
        index index.html;
        try_files $uri $uri.html $uri/ =404;

        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options nosniff always;
    }

    # Convenience redirects: /privacy → /legal/privacy.html, etc.
    location = /privacy { return 301 /legal/privacy.html; }
    location = /terms { return 301 /legal/terms.html; }
    location = /offer { return 301 /legal/offer.html; }
    location = /refunds { return 301 /legal/refunds.html; }
    location = /contacts { return 301 /legal/contacts.html; }

    # -------------------------------------------------------------------
    # Static downloads (Electron installers)
    # -------------------------------------------------------------------
    location /downloads/ {
        alias /opt/progresql/downloads/;

        add_header Access-Control-Allow-Origin $cors_origin always;

        # Security: only serve expected installer file types
        location ~* \.(dmg|exe|AppImage|deb|rpm|zip)$ {
            add_header Content-Disposition "attachment" always;
            add_header Cache-Control "no-cache" always;
        }

        autoindex off;
        try_files $uri =404;
    }

    # -------------------------------------------------------------------
    # Grafana monitoring dashboard
    # -------------------------------------------------------------------
    location /grafana/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # -------------------------------------------------------------------
    # Custom error pages
    # -------------------------------------------------------------------
    error_page 400 /errors/error.html?code=400&path=$request_uri;
    error_page 403 /errors/error.html?code=403&path=$request_uri;
    error_page 404 /errors/error.html?code=404&path=$request_uri;
    error_page 500 /errors/error.html?code=500&path=$request_uri;
    error_page 502 /errors/error.html?code=502&path=$request_uri;
    error_page 503 /errors/error.html?code=503&path=$request_uri;

    location /errors/ {
        alias /var/www/progresql/errors/;
        internal;
    }

    # Demo video: landing/progresql.mp4 plus CI-managed symlink landing/video-demo/progresql.mp4. Legacy URL redirects below.
    location = /progresql.mp4 {
        return 301 /video-demo/progresql.mp4$is_args$args;
    }

    # Landing page
    location / {
        alias /var/www/progresql/landing/;
        index index.html;
        try_files $uri $uri.html $uri/ /index.html;

        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options nosniff always;
    }

    access_log /var/log/nginx/progresql.access.log;
    error_log  /var/log/nginx/progresql.error.log warn;
}
