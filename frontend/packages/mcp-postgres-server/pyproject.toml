 [build-system]
 requires = ["setuptools>=68", "wheel"]
 build-backend = "setuptools.build_meta"

 [project]
 name = "progres-mcp"
 version = "0.1.0"
 description = "Safe MCP adapter for PostgreSQL metadata and explain access (no data)."
 readme = "README.md"
 requires-python = ">=3.12"
 authors = [{ name = "MCP Adapter", email = "dev@example.com" }]
 dependencies = [
   "psycopg[binary]>=3.3.2",
   "asyncpg>=0.31.0",
   "typing-extensions>=4.15.0",
  "mcp>=1.26.0",
 ]

 [project.optional-dependencies]
 dev = [
   "pytest>=9.0.2",
   "pytest-bdd>=8.1.0",
   "pytest-asyncio>=1.3.0",
   "ruff>=0.14.14",
 ]

 [tool.ruff]
 line-length = 100
 target-version = "py312"
 src = ["src", "tests"]

 [tool.pytest.ini_options]
 minversion = "9.0"
 addopts = "-ra"
 testpaths = ["tests"]
 markers = [
   "integration: marks tests that require a PostgreSQL connection",
 ]

