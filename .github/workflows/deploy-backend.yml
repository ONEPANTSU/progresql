name: Deploy Backend

on:
  push:
    tags:
      - 'backend-v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image locally
        run: docker build --file deploy/Dockerfile.backend --tag progresql-backend:latest .

      - name: Save image as tarball
        run: docker save progresql-backend:latest | gzip > /tmp/progresql-backend.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan progresql.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload image to server
        run: |
          scp -i ~/.ssh/deploy_key /tmp/progresql-backend.tar.gz root@progresql.com:/tmp/progresql-backend.tar.gz

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#backend-v}" >> $GITHUB_OUTPUT

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: progresql.com
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker load < /tmp/progresql-backend.tar.gz
            rm -f /tmp/progresql-backend.tar.gz
            cd /opt/progresql
            sed -i "s/PROGRESSQL_VERSION=.*/PROGRESSQL_VERSION=${{ steps.version.outputs.VERSION }}/" .env
            docker compose up -d --force-recreate backend
            docker system prune -f
