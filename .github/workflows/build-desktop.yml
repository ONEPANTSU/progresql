name: Build Desktop Clients

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. client-v1.0.12)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Windows installer
        working-directory: frontend
        run: npx nextron build --win

      - name: List artifacts
        working-directory: frontend/dist
        run: dir

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            frontend/dist/*.exe
          fail_on_missing: false

  build-linux:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Linux AppImage
        working-directory: frontend
        env:
          ELECTRON_DISABLE_SANDBOX: '1'
        run: npx nextron build --linux

      - name: Remove chrome-sandbox from AppImage (fixes SUID crash)
        working-directory: frontend/dist
        run: |
          sudo apt-get install -y libfuse2
          APPIMAGE=$(ls *.AppImage | head -1)
          chmod +x "$APPIMAGE"
          # Extract without FUSE
          ./"$APPIMAGE" --appimage-extract
          rm -f squashfs-root/chrome-sandbox
          # Repack
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

      - name: List artifacts
        working-directory: frontend/dist
        run: ls -lh

      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            frontend/dist/*.AppImage
          fail_on_missing: false
