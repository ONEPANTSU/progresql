name: Deploy Landing

on:
  push:
    tags:
      - 'landing-v*'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan progresql.com >> ~/.ssh/known_hosts

      - name: Create target directories on server
        run: |
          ssh -i ~/.ssh/deploy_key root@progresql.com \
            "mkdir -p /var/www/progresql/landing /var/www/progresql/payment /var/www/progresql/legal /var/www/progresql/errors"

      - name: Deploy landing static files
        run: |
          # progresql.mp4 is not in git — never delete an existing remote copy during --delete sync.
          rsync -avz --delete \
            --filter='protect progresql.mp4' \
            --exclude='legal/' --exclude='downloads/' --exclude='progresql.mp4' \
            -e "ssh -i ~/.ssh/deploy_key" \
            static/landing/ \
            root@progresql.com:/var/www/progresql/landing/

      - name: Deploy legal pages
        run: |
          # Must match nginx: location /legal/ { alias /var/www/progresql/legal/; }
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            static/legal/ \
            root@progresql.com:/var/www/progresql/legal/

      - name: Deploy payment static files
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            static/payment/ \
            root@progresql.com:/var/www/progresql/payment/

      - name: Copy screenshot to web root
        run: |
          scp -i ~/.ssh/deploy_key \
            static/landing/screenshot.png \
            root@progresql.com:/var/www/progresql/screenshot.png

      # Optional overwrite: только если хотите заменить ролик — приложите progresql.mp4 к релизу с ЭТИМ тегом.
      # Если ассета нет, на сервере остаётся уже залитый файл с прошлых деплоев.
      - name: Optionally overwrite demo video from Release
        run: |
          set -uo pipefail
          DEST=/var/www/progresql/landing/progresql.mp4
          if gh release download "${{ github.ref_name }}" -p "progresql.mp4" -O /tmp/progresql.mp4 2>/dev/null; then
            scp -i ~/.ssh/deploy_key /tmp/progresql.mp4 \
              root@progresql.com:"${DEST}"
            ssh -i ~/.ssh/deploy_key root@progresql.com \
              "chmod 644 '${DEST}'"
            echo "Replaced demo video from Release ${{ github.ref_name }}."
          else
            echo "No progresql.mp4 on Release ${{ github.ref_name }} — keeping existing file on server (if any)."
          fi

      - name: Fail if demo mp4 missing on server
        run: |
          ssh -i ~/.ssh/deploy_key root@progresql.com \
            "test -s /var/www/progresql/landing/progresql.mp4" || \
            { echo '::error::Missing /var/www/progresql/landing/progresql.mp4 — attach to Release or: scp static/progresql.mp4 server:/var/www/progresql/landing/ then chmod 644 that file'; exit 1; }

      - name: Deploy nginx config and reload
        run: |
          scp -i ~/.ssh/deploy_key \
            deploy/nginx/progresql.conf \
            root@progresql.com:/etc/nginx/sites-available/postgresql
          ssh -i ~/.ssh/deploy_key root@progresql.com \
            "ln -sf /etc/nginx/sites-available/postgresql /etc/nginx/sites-enabled/postgresql && nginx -t && nginx -s reload"

      - name: Verify deployment
        run: |
          echo "Landing deployed from tag ${{ github.ref_name }}"
          ssh -i ~/.ssh/deploy_key root@progresql.com \
            "ls -lh /var/www/progresql/landing/ && ls -lh /var/www/progresql/legal/"

      # Проверяем с самого сервера (127.0.0.1 + SNI): нет CDN/DNS-кэша, видно состояние сразу после reload.
      - name: Verify demo video is video/mp4 (origin)
        run: |
          set -euo pipefail
          URLPATH="video-demo/progresql.mp4?t=${GITHUB_RUN_ID:-local}"
          for i in 1 2 3 4 5 6; do
            CT=$(ssh -i ~/.ssh/deploy_key root@progresql.com \
              "curl -sSI --resolve progresql.com:443:127.0.0.1 'https://progresql.com/${URLPATH}'" | tr -d '\r' || true)
            echo "--- attempt ${i} ---"
            echo "$CT"
            if echo "$CT" | grep -qiE '^content-type:[[:space:]]*video/mp4'; then
              exit 0
            fi
            sleep 4
          done
          echo '::error::Origin still does not return video/mp4 (check file + chmod 644 on /var/www/progresql/landing/progresql.mp4).'
          exit 1
