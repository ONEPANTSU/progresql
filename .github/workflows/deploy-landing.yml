name: Deploy Landing

on:
  push:
    tags:
      - 'landing-v*'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan progresql.com >> ~/.ssh/known_hosts

      - name: Create target directories on server
        run: |
          ssh -i ~/.ssh/deploy_key root@progresql.com \
            "mkdir -p /var/www/postgresql/landing /var/www/postgresql/payment /var/www/postgresql/legal"

      - name: Deploy landing static files
        run: |
          rsync -avz --delete --exclude='legal/' --exclude='downloads/' -e "ssh -i ~/.ssh/deploy_key" \
            static/landing/ \
            root@progresql.com:/var/www/postgresql/landing/

      - name: Deploy legal pages (under landing)
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            static/legal/ \
            root@progresql.com:/var/www/postgresql/landing/legal/

      - name: Deploy payment static files
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            static/payment/ \
            root@progresql.com:/var/www/postgresql/payment/

      - name: Copy screenshot to web root
        run: |
          scp -i ~/.ssh/deploy_key \
            static/landing/screenshot.png \
            root@progresql.com:/var/www/postgresql/screenshot.png

      - name: Copy landing demo video from Release
        run: |
          # Video >100MB cannot live in git; attach 'progresql.mp4' to GitHub Release for this tag (assets ~2GB).
          set -uo pipefail
          DEST=/var/www/postgresql/landing/progresql.mp4
          if gh release download "${{ github.ref_name }}" -p "progresql.mp4" -O /tmp/progresql.mp4 2>/dev/null; then
            scp -i ~/.ssh/deploy_key /tmp/progresql.mp4 \
              root@progresql.com:"${DEST}"
          else
            echo "No Release asset 'progresql.mp4' for ${{ github.ref_name }} — upload to GitHub Release, then Re-run."
          fi

      - name: Deploy nginx config and reload
        run: |
          scp -i ~/.ssh/deploy_key \
            deploy/nginx/progresql.conf \
            root@progresql.com:/etc/nginx/sites-available/postgresql
          ssh -i ~/.ssh/deploy_key root@progresql.com \
            "nginx -t && nginx -s reload"

      - name: Verify deployment
        run: |
          echo "Landing deployed from tag ${{ github.ref_name }}"
          ssh -i ~/.ssh/deploy_key root@progresql.com \
            "ls -lh /var/www/postgresql/landing/"
