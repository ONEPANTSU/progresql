name: Deploy Landing

on:
  push:
    tags:
      - 'landing-v*'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan progresql.com >> ~/.ssh/known_hosts

      - name: Create target directories on server
        run: |
          ssh -i ~/.ssh/deploy_key root@progresql.com \
            "mkdir -p /var/www/progresql/landing /var/www/progresql/payment /var/www/progresql/legal"

      - name: Deploy landing static files
        run: |
          rsync -avz --delete --exclude='legal/' --exclude='downloads/' -e "ssh -i ~/.ssh/deploy_key" \
            static/landing/ \
            root@progresql.com:/var/www/progresql/landing/

      - name: Deploy legal pages (under landing)
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            static/legal/ \
            root@progresql.com:/var/www/progresql/landing/legal/

      - name: Deploy payment static files
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            static/payment/ \
            root@progresql.com:/var/www/progresql/payment/

      - name: Copy screenshot to web root
        run: |
          scp -i ~/.ssh/deploy_key \
            static/landing/screenshot.png \
            root@progresql.com:/var/www/progresql/screenshot.png

      - name: Copy landing demo video (when asset exists on tagged release)
        run: |
          set -euo pipefail
          if gh release download "${{ github.ref_name }}" -p "progresql.mp4" -O "/tmp/progresql.mp4" 2>/dev/null; then
            scp -i ~/.ssh/deploy_key \
              /tmp/progresql.mp4 \
              root@progresql.com:/var/www/progresql/landing/progresql.mp4
          else
            echo "Skipping: no progresql.mp4 attached to ${{ github.ref_name }}"
          fi

      - name: Deploy nginx config and reload
        run: |
          scp -i ~/.ssh/deploy_key \
            deploy/nginx/progresql.conf \
            root@progresql.com:/etc/nginx/sites-available/progresql
          ssh -i ~/.ssh/deploy_key root@progresql.com \
            "nginx -t && nginx -s reload"

      - name: Verify deployment
        run: |
          echo "Landing deployed from tag ${{ github.ref_name }}"
          ssh -i ~/.ssh/deploy_key root@progresql.com \
            "ls -lh /var/www/progresql/landing/"
