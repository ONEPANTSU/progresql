version: "2"

linters:
  exclusions:
    rules:
      # Tests often omit deliberate error checks; keep errcheck strict for production code only.
      - path: '_test\.go$'
        linters:
          - errcheck
      # Shared test helpers / mocks (no _test.go suffix).
      - path: 'internal/testutil/.*\.go$'
        linters:
          - errcheck
