# Client deploy — triggered by tag: client-v*
# DMG built locally via `make release-mac`, uploaded to GitHub Release
# This pipeline downloads DMG from GitHub and deploys to server
# Retries up to 10 minutes waiting for DMG to appear in the release.
when:
  - event: tag
    ref: refs/tags/client-v*

steps:
  - name: deploy-downloads
    image: alpine:latest
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    volumes:
      - /opt/progresql/downloads:/opt/progresql/downloads
    commands:
      - apk add --no-cache curl jq
      - VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/client-v//')
      - mkdir -p /opt/progresql/downloads
      - echo "==> Waiting for DMG in release $CI_COMMIT_TAG..."
      - |
        DMG_ID=""
        for i in $(seq 1 20); do
          RELEASE_JSON=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/ONEPANTSU/progresql/releases/tags/$CI_COMMIT_TAG")
          DMG_ID=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | endswith(".dmg")) | .id')
          if [ -n "$DMG_ID" ] && [ "$DMG_ID" != "null" ]; then
            echo "==> DMG found (asset $DMG_ID) on attempt $i"
            break
          fi
          echo "  Attempt $i/20: DMG not yet available, waiting 30s..."
          sleep 30
        done
        if [ -z "$DMG_ID" ] || [ "$DMG_ID" = "null" ]; then
          echo "ERROR: DMG not found after 10 minutes"
          exit 1
        fi
        echo "==> Downloading DMG..."
        curl -sL -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/octet-stream" "https://api.github.com/repos/ONEPANTSU/progresql/releases/assets/$DMG_ID" -o "/opt/progresql/downloads/ProgreSQL-$VERSION-arm64.dmg"
      - cd /opt/progresql/downloads
      - ln -sf "ProgreSQL-$VERSION-arm64.dmg" ProgreSQL-latest.dmg
      - echo "==> Downloads:"
      - ls -lh /opt/progresql/downloads/*.dmg
