# Client deploy — triggered by tag: client-v*
# DMG built locally via `make release-mac`, uploaded to GitHub Release
# This pipeline downloads artifacts from GitHub and deploys to server
when:
  - event: tag
    ref: refs/tags/client-v*

steps:
  - name: deploy-downloads
    image: alpine:latest
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    volumes:
      - /opt/progresql/downloads:/opt/progresql/downloads
    commands:
      - apk add --no-cache curl jq
      - VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/client-v//')
      - mkdir -p /opt/progresql/downloads
      - echo "==> Downloading artifacts for $CI_COMMIT_TAG (v$VERSION)..."
      - 'RELEASE_JSON=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/ONEPANTSU/progresql/releases/tags/$CI_COMMIT_TAG")'
      - 'DMG_ID=$(echo "$RELEASE_JSON" | jq -r ''.assets[] | select(.name | endswith(".dmg")) | .id'')'
      - 'ZIP_ID=$(echo "$RELEASE_JSON" | jq -r ''.assets[] | select(.name | endswith(".zip")) | .id'')'
      - 'if [ -n "$DMG_ID" ] && [ "$DMG_ID" != "null" ]; then echo "Downloading DMG (asset $DMG_ID)..."; curl -sL -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/octet-stream" "https://api.github.com/repos/ONEPANTSU/progresql/releases/assets/$DMG_ID" -o "/opt/progresql/downloads/ProgreSQL-$VERSION-arm64.dmg"; else echo "WARNING: DMG not found"; fi'
      - 'if [ -n "$ZIP_ID" ] && [ "$ZIP_ID" != "null" ]; then echo "Downloading ZIP (asset $ZIP_ID)..."; curl -sL -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/octet-stream" "https://api.github.com/repos/ONEPANTSU/progresql/releases/assets/$ZIP_ID" -o "/opt/progresql/downloads/ProgreSQL-$VERSION-arm64-mac.zip"; else echo "WARNING: ZIP not found"; fi'
      - cd /opt/progresql/downloads
      - ln -sf "ProgreSQL-$VERSION-arm64.dmg" ProgreSQL-latest.dmg
      - ln -sf "ProgreSQL-$VERSION-arm64-mac.zip" ProgreSQL-latest.zip
      - echo "==> Downloads:"
      - ls -lh /opt/progresql/downloads/
