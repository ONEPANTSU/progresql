# Client deploy — triggered by tag: client-v*
# DMG built locally via `make release-mac`, uploaded to GitHub Release
# EXE + AppImage built by GitHub Actions, uploaded to same release
# This pipeline downloads DMG+EXE+AppImage from GitHub and deploys to server
# Retries up to 10 minutes waiting for assets to appear in the release.
when:
  - event: tag
    ref: refs/tags/client-v*

steps:
  - name: deploy-downloads
    image: alpine:latest
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    volumes:
      - /opt/progresql/downloads:/opt/progresql/downloads
    commands:
      - apk add --no-cache curl jq
      - VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/client-v//')
      - mkdir -p /opt/progresql/downloads
      - |
        echo "==> Waiting for release assets for $CI_COMMIT_TAG..."
        DMG_ID=""
        for i in $(seq 1 20); do
          RELEASE_JSON=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/ONEPANTSU/progresql/releases/tags/$CI_COMMIT_TAG")

          # Check if response is valid JSON with assets
          if ! echo "$RELEASE_JSON" | jq -e '.assets' > /dev/null 2>&1; then
            echo "  Attempt $i/20: Release not found or invalid response, waiting 30s..."
            sleep 30
            continue
          fi

          DMG_ID=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | endswith(".dmg")) | .id' 2>/dev/null)
          if [ -n "$DMG_ID" ] && [ "$DMG_ID" != "null" ]; then
            echo "==> DMG found (asset $DMG_ID) on attempt $i"
            break
          fi
          echo "  Attempt $i/20: DMG not yet available, waiting 30s..."
          sleep 30
        done

        if [ -z "$DMG_ID" ] || [ "$DMG_ID" = "null" ]; then
          echo "ERROR: DMG not found after 10 minutes"
          exit 1
        fi

        echo "==> Downloading DMG..."
        curl -sL -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/octet-stream" \
          "https://api.github.com/repos/ONEPANTSU/progresql/releases/assets/$DMG_ID" \
          -o "/opt/progresql/downloads/ProgreSQL-$VERSION-arm64.dmg"

        echo "==> Checking for EXE in release..."
        EXE_ID=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | endswith(".exe")) | .id' 2>/dev/null)
        if [ -n "$EXE_ID" ] && [ "$EXE_ID" != "null" ]; then
          echo "==> EXE found (asset $EXE_ID), downloading..."
          curl -sL -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/ONEPANTSU/progresql/releases/assets/$EXE_ID" \
            -o "/opt/progresql/downloads/ProgreSQL-$VERSION-Setup.exe"
          ln -sf "ProgreSQL-$VERSION-Setup.exe" /opt/progresql/downloads/ProgreSQL-latest.exe
        else
          echo "==> No EXE found in release (Windows build may still be running)"
        fi

        echo "==> Checking for AppImage in release..."
        APPIMAGE_ID=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | endswith(".AppImage")) | .id' 2>/dev/null)
        if [ -n "$APPIMAGE_ID" ] && [ "$APPIMAGE_ID" != "null" ]; then
          echo "==> AppImage found (asset $APPIMAGE_ID), downloading..."
          curl -sL -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/ONEPANTSU/progresql/releases/assets/$APPIMAGE_ID" \
            -o "/opt/progresql/downloads/ProgreSQL-$VERSION.AppImage"
          ln -sf "ProgreSQL-$VERSION.AppImage" /opt/progresql/downloads/ProgreSQL-latest.AppImage
        else
          echo "==> No AppImage found in release (Linux build may still be running)"
        fi

        ln -sf "ProgreSQL-$VERSION-arm64.dmg" /opt/progresql/downloads/ProgreSQL-latest.dmg
        echo "==> Downloads:"
        ls -lh /opt/progresql/downloads/
